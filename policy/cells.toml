# policy/cells.toml
# Default policy-to-cell routing for local Legis startup.
# Exact policy names beat globs; unlisted policies use default_cell.

default_cell = "structured"

[[policy]]
pattern = "import-allowlist"
cell = "coached"

[[policy]]
pattern = "protected.*"
cell = "protected"

[[policy]]
pattern = "human.*"
cell = "structured"
