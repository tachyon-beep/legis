name: override-rate gate
on:
  pull_request:
  push:
    branches: [main]
jobs:
  override-rate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .
      - name: Enforce override-rate gate
        run: legis check-override-rate
