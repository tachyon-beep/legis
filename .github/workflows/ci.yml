name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Run test suite
        run: uv run pytest --cov=legis --cov-report=term-missing --cov-fail-under=70
      - name: Run SEI conformance oracle
        run: uv run pytest tests/conformance/test_sei_oracle.py
      - name: Run live Clarion oracle
        if: ${{ vars.CLARION_URL != '' }}
        env:
          CLARION_URL: ${{ vars.CLARION_URL }}
          CLARION_LIVE_ORACLE_LOCATOR: ${{ vars.CLARION_LIVE_ORACLE_LOCATOR }}
          LEGIS_CLARION_HMAC_KEY: ${{ secrets.LEGIS_CLARION_HMAC_KEY }}
        run: uv run pytest tests/conformance/test_live_clarion_oracle.py
      - name: Run type check
        run: uv run mypy src/legis
      - name: Run policy-boundary honesty gate
        run: uv run legis policy-boundary-check --root src --repo-root .

  override-rate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Enforce override-rate gate
        run: uv run legis governance-gate --db sqlite:///legis-governance.db
