integrations:
  filigree:
    actor: loomweave-mcp
    base_url: http://127.0.0.1:8426
    enabled: true
    timeout_seconds: 5
    token_env: FILIGREE_API_TOKEN
llm_policy:
  allow_live_provider: false
  cache_max_age_days: 180
  claude_cli:
    exclude_dynamic_system_prompt_sections: true
    executable: claude
    max_turns: 2
    model: null
    no_session_persistence: true
    permission_mode: plan
    timeout_seconds: 300
    tools: []
  codex_cli:
    executable: codex
    model: null
    profile: null
    sandbox: read-only
    timeout_seconds: 300
  enabled: false
  max_inferred_edges_per_caller: 8
  model_id: anthropic/claude-sonnet-4.6
  openrouter:
    api_key_env: OPENROUTER_API_KEY
    attribution:
      referer: https://github.com/foundryside-dev/loomweave
      title: Loomweave
    endpoint_url: https://openrouter.ai/api/v1
  provider: openrouter
  session_token_ceiling: 1000000
serve:
  http:
    bind: 127.0.0.1:9111
    enabled: true
    wardline_taint_write: true
  mcp:
    enable_write_tools: false
version: 1
